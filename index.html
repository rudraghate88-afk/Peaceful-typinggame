<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peaceful Typing</title>
    <style>
        /* Your Zen Styling */
        body { margin: 0; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        
        /* The hidden input fix */
        #mobile-keyboard-trigger {
            position: absolute; opacity: 0; pointer-events: none;
            top: 0; left: 0; width: 1px; height: 1px;
        }
    </style>
</head>
<body>

    <!-- This invisible box forces the phone keyboard to pop up when you tap -->
    <input type="text" id="mobile-keyboard-trigger" />

    <div id="game-container">
        <h1>Peaceful Typing</h1>
        <p>Tap anywhere to type...</p>
    </div>

    <script>
        const inputTrigger = document.getElementById('mobile-keyboard-trigger');
        const container = document.getElementById('game-container');

        // 1. Force the keyboard open when they tap the screen
        container.addEventListener('click', () => {
            inputTrigger.focus();
        });

        // 2. Handle desktop typing (Keyboard)
        window.addEventListener('keydown', (e) => {
            processInput(e.key);
        });

        // 3. Handle mobile typing (On-screen Keyboard)
        inputTrigger.addEventListener('input', (e) => {
            const char = e.data; // Gets the character typed on mobile
            if (char) {
                processInput(char);
            }
            inputTrigger.value = ''; // Reset for the next key
        });

        // --- PASTE YOUR GAME LOGIC HERE ---
        function processInput(key) {
            console.log("User typed:", key);
            // Example: If you have a function called "checkLetter", call it here!
            // checkLetter(key);
        }
    </script>
</body>
</html>
